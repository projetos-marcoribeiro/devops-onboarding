<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOps Onboarding</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@3/dist/style.min.css">
  <style>
    .sidebar-nav li > a { font-size: 14px; }
    .onboarding-banner {
      margin-bottom: 24px;
      padding: 14px 20px;
      background: var(--onboarding-banner-bg, linear-gradient(135deg, #e8f4fd 0%, #f0f7ff 100%));
      border: 1px solid var(--onboarding-banner-border, #b8d8f8);
      border-radius: 8px;
      font-size: 14px;
      color: var(--text-color-base);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .onboarding-banner .banner-icon {
      font-size: 24px;
      flex-shrink: 0;
    }
    .onboarding-banner a {
      color: var(--theme-color, #2563eb);
      font-weight: 600;
      text-decoration: none;
    }
    .onboarding-banner a:hover {
      text-decoration: underline;
    }
    .onboarding-banner .banner-btn {
      display: inline-block;
      margin-top: 6px;
      padding: 6px 14px;
      background: var(--theme-color, #2563eb);
      color: #fff !important;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none !important;
    }
    .onboarding-banner .banner-btn:hover {
      opacity: 0.85;
    }
    .sidebar-progress {
      padding: 12px 15px;
      margin: 10px 0;
      background: var(--onboarding-banner-bg, linear-gradient(135deg, #e8f4fd 0%, #f0f7ff 100%));
      border-radius: 8px;
      font-size: 12px;
      text-align: center;
      border: 1px solid var(--onboarding-banner-border, #b8d8f8);
    }
    .sidebar-progress a {
      color: var(--theme-color, #2563eb);
      text-decoration: none;
      font-weight: 600;
    }
    .sidebar-progress a:hover {
      text-decoration: underline;
    }
    .sidebar-progress .sidebar-btn {
      display: inline-block;
      margin-top: 6px;
      padding: 4px 10px;
      background: var(--theme-color, #2563eb);
      color: #fff !important;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-decoration: none !important;
    }
    .sidebar-progress .sidebar-btn:hover {
      opacity: 0.85;
    }
    a[href*="servicedesk"][target="_blank"] {
      display: inline-block;
      margin: 8px 0;
      padding: 8px 16px;
      background: #0052CC;
      color: #fff !important;
      border-radius: 5px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none !important;
    }
    a[href*="servicedesk"][target="_blank"]:hover {
      background: #0747A6;
    }

    /* Dark mode overrides */
    :root {
      --onboarding-banner-bg: linear-gradient(135deg, #e8f4fd 0%, #f0f7ff 100%);
      --onboarding-banner-border: #b8d8f8;
    }
    [data-theme="dark"] {
      --onboarding-banner-bg: linear-gradient(135deg, #1a2332 0%, #1e293b 100%);
      --onboarding-banner-border: #334155;
    }
    [data-theme="dark"] a[href*="servicedesk"][target="_blank"] {
      background: #1d4ed8;
    }
    [data-theme="dark"] a[href*="servicedesk"][target="_blank"]:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'DevOps Onboarding',
      repo: 'https://github.com/projetos-marcoribeiro/devops-onboarding',
      homepage: 'README.md',
      loadSidebar: true,
      subMaxLevel: 2,
      relativePath: true,
      auto2top: true,
      search: {
        placeholder: 'Buscar...',
        noData: 'Nenhum resultado.',
        depth: 3
      },
      externalLinkTarget: '_blank',
      darklightTheme: {
        defaultTheme: 'light',
        siteFont: 'Source Sans Pro, Helvetica Neue, Arial, sans-serif',
        dark: {
          accent: '#3b82f6',
          toogleBackground: '#1a1a2e',
          background: '#0f172a',
          textColor: '#e2e8f0',
          codeTextColor: '#e2e8f0',
          codeBackgroundColor: '#1e293b',
          borderColor: '#334155',
          blockQuoteColor: '#94a3b8',
          highlightColor: '#1e40af',
          sidebarSublink: '#94a3b8',
          codeTypeColor: '#e2e8f0',
          coverBackground: 'linear-gradient(to left bottom, #0f172a, #1e293b)',
          toogleImage: 'url(https://cdn.jsdelivr.net/npm/docsify-darklight-theme@3/icons/sun.svg)'
        },
        light: {
          accent: '#2563eb',
          toogleBackground: '#fff',
          background: '#fff',
          textColor: '#1e293b',
          codeTextColor: '#525252',
          codeBackgroundColor: '#f5f5f5',
          borderColor: '#e2e8f0',
          blockQuoteColor: '#64748b',
          highlightColor: '#2563eb',
          sidebarSublink: '#64748b',
          codeTypeColor: '#1e293b',
          coverBackground: 'linear-gradient(to left bottom, #fff, #f8fafc)',
          toogleImage: 'url(https://cdn.jsdelivr.net/npm/docsify-darklight-theme@3/icons/moon.svg)'
        }
      },
      plugins: [
        function(hook) {
          hook.doneEach(function() {
            if (window.mermaid) {
              var theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'default';
              mermaid.initialize({ startOnLoad: false, theme: theme });
              mermaid.init(undefined, document.querySelectorAll('.language-mermaid'));
            }
          });
        },
        function(hook) {
          var banner = '<div class="onboarding-banner">' +
            '<span class="banner-icon">📋</span>' +
            '<div>' +
            '<strong>Acompanhe seu progresso no onboarding</strong><br>' +
            'Registre seu avanço em uma Issue do GitHub. Seu fellow e coordenador acompanham por lá.<br>' +
            '<a class="banner-btn" href="https://github.com/projetos-marcoribeiro/devops-onboarding/issues/new?template=onboarding-checklist.md&labels=onboarding" target="_blank">Abrir minha Issue</a> ' +
            '<a href="#/devops-journey/onboarding-checklist" style="margin-left:10px;font-size:12px;">Ver instruções</a>' +
            '</div></div>';
          hook.afterEach(function(html) {
            return banner + html;
          });
        },
        function(hook) {
          hook.ready(function() {
            var sidebar = document.querySelector('.sidebar-nav');
            if (sidebar) {
              var progressDiv = document.createElement('div');
              progressDiv.className = 'sidebar-progress';
              progressDiv.innerHTML = '📋 <a href="#/devops-journey/onboarding-checklist">Checklist de Progresso</a><br>' +
                '<a class="sidebar-btn" href="https://github.com/projetos-marcoribeiro/devops-onboarding/issues/new?template=onboarding-checklist.md&labels=onboarding" target="_blank">Abrir minha Issue</a>';
              sidebar.parentNode.insertBefore(progressDiv, sidebar);
            }
          });
        }
      ]
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@3/dist/index.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script>mermaid.initialize({ startOnLoad: false, theme: 'default' });</script>
</body>
</html>
