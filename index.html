<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOps Onboarding</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    .sidebar-nav li > a { font-size: 14px; }
    .onboarding-banner {
      margin-bottom: 24px;
      padding: 14px 20px;
      background: linear-gradient(135deg, #e8f4fd 0%, #f0f7ff 100%);
      border: 1px solid #b8d8f8;
      border-radius: 8px;
      font-size: 14px;
      color: #1a3a5c;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .onboarding-banner .banner-icon {
      font-size: 24px;
      flex-shrink: 0;
    }
    .onboarding-banner a {
      color: #2563eb;
      font-weight: 600;
      text-decoration: none;
    }
    .onboarding-banner a:hover {
      text-decoration: underline;
    }
    .onboarding-banner .banner-btn {
      display: inline-block;
      margin-top: 6px;
      padding: 6px 14px;
      background: #2563eb;
      color: #fff !important;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none !important;
    }
    .onboarding-banner .banner-btn:hover {
      background: #1d4ed8;
    }
    .sidebar-progress {
      padding: 12px 15px;
      margin: 10px 0;
      background: linear-gradient(135deg, #e8f4fd 0%, #f0f7ff 100%);
      border-radius: 8px;
      font-size: 12px;
      text-align: center;
      border: 1px solid #b8d8f8;
    }
    .sidebar-progress a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }
    .sidebar-progress a:hover {
      text-decoration: underline;
    }
    .sidebar-progress .sidebar-btn {
      display: inline-block;
      margin-top: 6px;
      padding: 4px 10px;
      background: #2563eb;
      color: #fff !important;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-decoration: none !important;
    }
    .sidebar-progress .sidebar-btn:hover {
      background: #1d4ed8;
    }
    a[href*="servicedesk"][target="_blank"] {
      display: inline-block;
      margin: 8px 0;
      padding: 8px 16px;
      background: #0052CC;
      color: #fff !important;
      border-radius: 5px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none !important;
    }
    a[href*="servicedesk"][target="_blank"]:hover {
      background: #0747A6;
    }

    /* Dark mode toggle in sidebar */
    .dark-toggle {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid #ddd;
      background: #fff;
      cursor: pointer;
      font-size: 15px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.3s, border-color 0.3s;
      margin-left: 8px;
      vertical-align: middle;
      position: relative;
      top: -2px;
    }
    .dark-toggle:hover { background: #f0f0f0; }
    html[data-theme="dark"] body { background: #1a1a2e; color: #e0e0e0; }
    html[data-theme="dark"] .sidebar { background: #16213e; color: #e0e0e0; border-right-color: #2a2a4a; }
    html[data-theme="dark"] .sidebar-nav a { color: #c0c0c0; }
    html[data-theme="dark"] .sidebar-nav a:hover,
    html[data-theme="dark"] .sidebar-nav a.active { color: #6ea8fe; }
    html[data-theme="dark"] .sidebar-nav li.active > a { color: #6ea8fe; border-color: #6ea8fe; }
    html[data-theme="dark"] .content { background: #1a1a2e; color: #e0e0e0; }
    html[data-theme="dark"] .markdown-section { color: #e0e0e0; }
    html[data-theme="dark"] .markdown-section h1,
    html[data-theme="dark"] .markdown-section h2,
    html[data-theme="dark"] .markdown-section h3,
    html[data-theme="dark"] .markdown-section h4 { color: #f0f0f0; }
    html[data-theme="dark"] .markdown-section a { color: #6ea8fe; }
    html[data-theme="dark"] .markdown-section code { background: #2a2a4a; color: #e0e0e0; }
    html[data-theme="dark"] .markdown-section pre { background: #0f3460; }
    html[data-theme="dark"] .markdown-section pre code { color: #e0e0e0; background: transparent; }
    html[data-theme="dark"] .markdown-section blockquote { border-left-color: #6ea8fe; color: #b0b0b0; }
    html[data-theme="dark"] .markdown-section table th { background: #16213e; color: #e0e0e0; }
    html[data-theme="dark"] .markdown-section table td { border-color: #2a2a4a; color: #d0d0d0; }
    html[data-theme="dark"] .markdown-section table tr:nth-child(2n) { background: #16213e; }
    html[data-theme="dark"] .markdown-section hr { border-color: #2a2a4a; }
    html[data-theme="dark"] .search input { background: #16213e; color: #e0e0e0; border-color: #2a2a4a; }
    html[data-theme="dark"] .search .results-panel { background: #1a1a2e; }
    html[data-theme="dark"] .search .matching-post { border-color: #2a2a4a; }
    html[data-theme="dark"] .app-name-link { color: #e0e0e0; }
    html[data-theme="dark"] .onboarding-banner { background: linear-gradient(135deg, #16213e 0%, #1a1a2e 100%); border-color: #2a2a4a; color: #e0e0e0; }
    html[data-theme="dark"] .sidebar-progress { background: linear-gradient(135deg, #16213e 0%, #1a1a2e 100%); border-color: #2a2a4a; }
    html[data-theme="dark"] .dark-toggle { background: #16213e; border-color: #2a2a4a; }
    html[data-theme="dark"] .dark-toggle:hover { background: #0f3460; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    function toggleDark() {
      var html = document.documentElement;
      var btn = document.querySelector('.dark-toggle');
      if (html.getAttribute('data-theme') === 'dark') {
        html.removeAttribute('data-theme');
        if (btn) btn.textContent = '🌙';
        localStorage.setItem('theme', 'light');
      } else {
        html.setAttribute('data-theme', 'dark');
        if (btn) btn.textContent = '☀️';
        localStorage.setItem('theme', 'dark');
      }
    }
    // Restore saved preference
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  </script>
  <script>
    window.$docsify = {
      name: 'DevOps Onboarding',
      repo: 'https://github.com/projetos-marcoribeiro/devops-onboarding',
      homepage: 'README.md',
      loadSidebar: true,
      subMaxLevel: 2,
      relativePath: true,
      auto2top: true,
      search: {
        placeholder: 'Buscar...',
        noData: 'Nenhum resultado.',
        depth: 3
      },
      externalLinkTarget: '_blank',
      plugins: [
        function(hook) {
          hook.doneEach(function() {
            if (window.mermaid) {
              mermaid.init(undefined, document.querySelectorAll('.language-mermaid'));
            }
          });
        },
        function(hook) {
          var banner = '<div class="onboarding-banner">' +
            '<span class="banner-icon">📋</span>' +
            '<div>' +
            '<strong>Acompanhe seu progresso no onboarding</strong><br>' +
            'Registre seu avanço em uma Issue do GitHub. Seu fellow e coordenador acompanham por lá.<br>' +
            '<a class="banner-btn" href="https://github.com/projetos-marcoribeiro/devops-onboarding/issues/new?template=onboarding-checklist.md&labels=onboarding" target="_blank">Abrir minha Issue</a> ' +
            '<a href="#/devops-journey/onboarding-checklist" style="margin-left:10px;font-size:12px;">Ver instruções</a>' +
            '</div></div>';
          hook.afterEach(function(html) {
            return banner + html;
          });
        },
        function(hook) {
          hook.ready(function() {
            // Inject dark mode toggle next to sidebar title
            var appName = document.querySelector('.app-name-link') || document.querySelector('.app-name');
            if (appName) {
              var btn = document.createElement('button');
              btn.className = 'dark-toggle';
              btn.title = 'Alternar tema claro/escuro';
              btn.textContent = localStorage.getItem('theme') === 'dark' ? '☀️' : '🌙';
              btn.onclick = function() { toggleDark(); };
              appName.insertAdjacentElement('afterend', btn);
            }
            // Sidebar progress widget
            var sidebar = document.querySelector('.sidebar-nav');
            if (sidebar) {
              var progressDiv = document.createElement('div');
              progressDiv.className = 'sidebar-progress';
              progressDiv.innerHTML = '📋 <a href="#/devops-journey/onboarding-checklist">Checklist de Progresso</a><br>' +
                '<a class="sidebar-btn" href="https://github.com/projetos-marcoribeiro/devops-onboarding/issues/new?template=onboarding-checklist.md&labels=onboarding" target="_blank">Abrir minha Issue</a>';
              sidebar.parentNode.insertBefore(progressDiv, sidebar);
            }
          });
        }
      ]
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script>mermaid.initialize({ startOnLoad: false, theme: 'default' });</script>
</body>
</html>
